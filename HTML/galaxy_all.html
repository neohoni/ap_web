<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung Galaxy 전 라인업 시뮬레이터</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080c14;--surface:#0d1220;--raised:#131926;--card:#171f30;--line:#1f2d45;--line2:#2a3d5a;--line3:#3a5070;
  --text:#c8d8f0;--text2:#7090b8;--text3:#3a5070;
  --s:#38bdf8;--zf:#a78bfa;--zp:#f472b6;--a:#34d399;--m:#fb923c;--f:#facc15;--xc:#f87171;--tab:#60a5fa;
  --white:#e8f4ff;
}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--line3);border-radius:2px}
.mono{font-family:'JetBrains Mono',monospace}
.grotesk{font-family:'Space Grotesk',sans-serif}

/* ─── TOPBAR ─── */
.top{display:flex;align-items:center;gap:1rem;padding:.55rem 1.25rem;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--surface)}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--white);display:flex;align-items:center;gap:.5rem;letter-spacing:-.3px}
.logo-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--s),var(--zf));display:flex;align-items:center;justify-content:center;font-size:13px}
.top-right{display:flex;align-items:center;gap:.5rem;margin-left:auto}
.chip{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.5px}
.chip-v3{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);color:var(--s)}
.chip-ai{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);color:var(--zf)}
.mod-badge{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);color:var(--a);display:none;font-weight:600}

/* ─── SERIES TABS ─── */
.series-bar{display:flex;align-items:stretch;border-bottom:1px solid var(--line);flex-shrink:0;overflow-x:auto;background:var(--surface)}
.sr-tab{display:flex;align-items:center;gap:.35rem;padding:.45rem 1rem;border:none;background:transparent;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:11px;color:var(--text2);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;flex-shrink:0;letter-spacing:.2px}
.sr-tab .sr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sr-tab:hover{color:var(--text)}
.sr-tab.act{color:var(--white);border-bottom-color:var(--cur-col,var(--s))}
.sr-count{font-size:9px;background:var(--line);color:var(--text3);padding:1px 5px;border-radius:10px;font-family:'JetBrains Mono',monospace}

/* ─── MODEL STRIP ─── */
.model-strip{padding:.4rem 1rem;border-bottom:1px solid var(--line);overflow-x:auto;flex-shrink:0;background:var(--surface)}
.model-row{display:flex;gap:.3rem;min-width:max-content;align-items:center}
.mdl-btn{display:flex;flex-direction:column;align-items:center;gap:.1rem;padding:.3rem .65rem;border-radius:6px;border:1px solid var(--line);background:transparent;cursor:pointer;transition:all .2s;flex-shrink:0}
.mdl-btn:hover{border-color:var(--line2)}
.mdl-btn.act{border-color:transparent}
.mdl-btn .mid{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px}
.mdl-btn .myr{font-size:8px;opacity:.55;font-family:'JetBrains Mono',monospace}
.mdl-btn .mst{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:.3px;margin-top:1px;font-family:'JetBrains Mono',monospace}
.st-c{background:rgba(52,211,153,.1);color:var(--a)}
.st-r{background:rgba(56,189,248,.1);color:var(--s)}
.st-m{background:rgba(167,139,250,.1);color:var(--zf)}
.st-f{background:rgba(244,114,182,.1);color:var(--zp)}
.model-sep{width:1px;height:32px;background:var(--line);flex-shrink:0;margin:0 .2rem}

/* ─── MAIN LAYOUT ─── */
.main{display:grid;grid-template-columns:270px 1fr 300px;flex:1;overflow:hidden;min-height:0}

/* ─── LEFT: DEVICE VISUAL + SCORE ─── */
.left{border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.left-scroll{overflow-y:auto;flex:1;padding:1rem .9rem}

.device-visual{margin-bottom:1rem;text-align:center}
.phone-wrap{position:relative;display:inline-block;margin-bottom:.7rem}
.phone-body{border-radius:22px;border:2px solid var(--line2);background:var(--raised);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;margin:0 auto;transition:all .4s}
.phone-notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);border-radius:0 0 8px 8px;background:var(--line)}
.phone-hole{position:absolute;top:10px;left:50%;transform:translateX(-50%);border-radius:50%;background:var(--line)}
.phone-isle{position:absolute;top:8px;left:50%;transform:translateX(-50%);border-radius:20px;background:var(--line)}
.phone-screen{border-radius:14px;background:var(--ink);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:all .3s}
.phone-screen::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent)}
.phone-home{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);border-radius:2px;background:var(--line2)}
.fold-spine{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--line3);transform:translateY(-50%)}
.phone-emoji{font-size:22px}
.phone-cam-bump{position:absolute;top:12px;left:12px;width:28px;background:var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
.cam-dot{width:8px;height:8px;border-radius:50%;background:var(--line2);border:1px solid var(--line3)}

.device-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--white)}
.device-sub{font-size:10px;color:var(--text2);margin:.2rem 0}
.device-status{display:inline-flex;align-items:center;gap:.3rem;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:.3px;padding:2px 8px;border-radius:4px;margin-top:.3rem}

/* Score ring */
.score-row{display:flex;align-items:center;gap:.75rem;background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:.75rem;margin-bottom:.85rem}
.sring{position:relative;width:52px;height:52px;flex-shrink:0}
.sring svg{transform:rotate(-90deg)}
.snum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px}
.smeta .slbl{font-size:8px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.2rem;font-family:'Space Grotesk',sans-serif}
.smeta .sgrade{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px}
.smeta .sdesc{font-size:9px;color:var(--text2);margin-top:.1rem}

/* Bars */
.perf-bars{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:.75rem;margin-bottom:.85rem}
.pb-title{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.65rem;font-family:'Space Grotesk',sans-serif;font-weight:600}
.pbar{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.pbar:last-child{margin-bottom:0}
.pbar-k{font-size:9px;color:var(--text2);width:44px;text-align:right;flex-shrink:0;letter-spacing:.2px;font-family:'Space Grotesk',sans-serif}
.pbar-tr{flex:1;height:3px;background:var(--line);border-radius:2px;position:relative;overflow:visible}
.pb-o{position:absolute;top:0;left:0;height:100%;border-radius:2px;opacity:.25;background:var(--text3);transition:width .5s}
.pb-f{position:absolute;top:0;left:0;height:100%;border-radius:2px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.pbar-v{font-size:9px;color:var(--text2);width:24px;font-family:'JetBrains Mono',monospace;font-weight:600}
.pbar-d{font-size:9px;width:24px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600}
.d+{color:var(--a)}.d-{color:var(--xc)}.d0{color:var(--text3)}

/* ─── CENTER: SPECS ─── */
.center{overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}

.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:.85rem .95rem}
.card-full{grid-column:1/-1}
.card-title{font-size:8px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:.75rem;font-family:'Space Grotesk',sans-serif;font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}

/* Spec cells */
.spec-g{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.sc{background:var(--raised);border-radius:7px;padding:.5rem .65rem}
.sc-l{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.15rem;font-family:'Space Grotesk',sans-serif}
.sc-v{font-size:11px;color:var(--text);font-weight:500;line-height:1.4}
.sc-new{font-size:7px;background:rgba(56,189,248,.1);color:var(--s);padding:0 4px;border-radius:3px;margin-left:2px;font-weight:700;letter-spacing:.3px;border:1px solid rgba(56,189,248,.2);font-family:'JetBrains Mono',monospace}

/* Evo list */
.evo{display:flex;align-items:flex-start;gap:.4rem;padding:.38rem 0;border-bottom:1px solid var(--line);font-size:10px;color:var(--text2);line-height:1.5}
.evo:last-child{border-bottom:none}
.evo-d{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:.38rem}

/* Diff table */
.dtbl{width:100%;border-collapse:collapse;font-size:10px}
.dtbl th{color:var(--text3);font-weight:500;text-align:left;padding:.28rem .4rem;border-bottom:1px solid var(--line);font-size:8px;letter-spacing:.5px;text-transform:uppercase;font-family:'Space Grotesk',sans-serif}
.dtbl td{padding:.28rem .4rem;border-bottom:1px solid var(--line)}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr.chg{background:rgba(56,189,248,.03);border-left:2px solid rgba(56,189,248,.3)}
.td-o{color:var(--text3)}.td-c{color:var(--text);font-weight:500}
.td-u{color:var(--a);font-weight:700}.td-d{color:var(--xc);font-weight:700}.td-e{color:var(--text3)}

/* AI Panel */
.sim-result{padding:.6rem .8rem;background:linear-gradient(135deg,rgba(56,189,248,.04),rgba(167,139,250,.04));border:1px solid rgba(56,189,248,.12);border-radius:8px;font-size:10px;color:var(--text2);line-height:1.7}
.future-block{background:linear-gradient(135deg,rgba(167,139,250,.06),rgba(244,114,182,.04));border:1px solid rgba(167,139,250,.2);border-radius:10px;padding:.85rem .95rem}
.future-block .card-title{color:var(--zf)}
.future-actions{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}
.fa-btn{font-size:10px;padding:.32rem .7rem;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;border:1px solid rgba(167,139,250,.3);background:rgba(167,139,250,.07);color:var(--zf)}
.fa-btn:hover{background:rgba(167,139,250,.14)}
.fa-btn:disabled{opacity:.35;cursor:not-allowed}
.predict-out{margin-top:.65rem;padding:.55rem .7rem;background:var(--raised);border-radius:7px;font-size:10px;color:var(--text2);line-height:1.65;border:1px solid var(--line);display:none}

/* ─── RIGHT: PARAMS ─── */
.right{border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.right-scroll{overflow-y:auto;flex:1;padding:1rem .9rem}

.param-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.param-hdr span{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'Space Grotesk',sans-serif;font-weight:600}
.hdr-btns{display:flex;gap:.3rem}
.mini-btn{font-size:9px;padding:2px 7px;border-radius:5px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;border:1px solid var(--line2);background:transparent;color:var(--text2)}
.mini-btn:hover{color:var(--text);border-color:var(--line3)}
.mini-btn.predict-btn{border-color:rgba(167,139,250,.3);color:var(--zf);background:rgba(167,139,250,.06);display:none}

.cat-hdr{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin:.7rem 0 .3rem;font-family:'Space Grotesk',sans-serif}
.pr{margin-bottom:.7rem}
.pr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem}
.pr-name{font-size:10px;color:var(--text2);font-family:'Space Grotesk',sans-serif}
.pr-right{display:flex;align-items:center;gap:.25rem}
.pr-in{width:48px;background:var(--raised);border:1px solid var(--line2);border-radius:5px;color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;text-align:right;padding:2px 5px;outline:none;transition:border-color .2s}
.pr-in:focus{border-color:var(--cur-col,var(--s))}
.pr-unit{font-size:9px;color:var(--text3);min-width:20px;font-family:'JetBrains Mono',monospace}
.pr-tag{font-size:7px;padding:1px 4px;border-radius:2px;font-weight:700;letter-spacing:.3px;display:none;font-family:'JetBrains Mono',monospace}
.pr-tag.on{display:inline-block;background:rgba(52,211,153,.1);color:var(--a);border:1px solid rgba(52,211,153,.2)}
.pr-slider{width:100%;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--line);outline:none;cursor:pointer}
.pr-slider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--cur-col,var(--s));cursor:pointer;border:2px solid var(--ink)}
.pr-slider::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--cur-col,var(--s));cursor:pointer;border:2px solid var(--ink)}

.sim-btn{width:100%;padding:.65rem;background:linear-gradient(135deg,var(--cur-col,var(--s)),var(--zf));border:none;border-radius:8px;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .2s;letter-spacing:.2px;margin-top:.6rem}
.sim-btn:hover{opacity:.85}

/* ─── CHAT ─── */
.chat-wrap{border-top:1px solid var(--line);display:flex;flex-direction:column;height:220px;flex-shrink:0}
.chat-top{display:flex;align-items:center;gap:.4rem;padding:.45rem 1rem;border-bottom:1px solid var(--line);flex-shrink:0}
.chat-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;color:var(--white)}
.ai-pip{font-size:8px;background:linear-gradient(135deg,var(--s),var(--zf));color:#fff;padding:1px 6px;border-radius:8px;font-weight:700;letter-spacing:.5px;font-family:'JetBrains Mono',monospace}
.ctx-tag{margin-left:auto;font-size:9px;padding:2px 6px;background:var(--raised);border:1px solid var(--line);border-radius:6px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.chat-msgs{flex:1;overflow-y:auto;padding:.5rem 1rem;display:flex;flex-direction:column;gap:.35rem}
.msg{padding:.45rem .7rem;border-radius:9px;font-size:10px;line-height:1.65;max-width:86%}
.msg-u{background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(167,139,250,.08));border:1px solid rgba(56,189,248,.15);align-self:flex-end;color:var(--text)}
.msg-a{background:var(--raised);border:1px solid var(--line);align-self:flex-start;color:var(--text2)}
.chat-foot{padding:.45rem .9rem;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:.3rem;flex-shrink:0}
.qrow{display:flex;gap:.25rem;flex-wrap:wrap}
.qb{font-size:9px;padding:.22rem .5rem;background:var(--raised);border:1px solid var(--line);border-radius:4px;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .18s;white-space:nowrap}
.qb:hover{border-color:var(--line3);color:var(--text)}
.chat-row{display:flex;gap:.35rem}
.cin{flex:1;background:var(--raised);border:1px solid var(--line2);border-radius:6px;padding:.4rem .65rem;color:var(--text);font-size:10px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
.cin:focus{border-color:var(--cur-col,var(--s))}
.cin::placeholder{color:var(--text3)}
.sbtn{padding:.4rem .8rem;background:linear-gradient(135deg,var(--cur-col,var(--s)),var(--zf));border:none;border-radius:6px;color:#fff;font-size:10px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;white-space:nowrap;transition:opacity .2s}
.sbtn:hover{opacity:.85}
.sbtn:disabled{opacity:.35;cursor:not-allowed}
.ld span{animation:ld .7s infinite;display:inline-block}
.ld span:nth-child(2){animation-delay:.15s}
.ld span:nth-child(3){animation-delay:.3s}
@keyframes ld{0%,80%,100%{opacity:.2;transform:translateY(0)}40%{opacity:1;transform:translateY(-2px)}}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease forwards}

/* Model overview card */
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
.ov-item{background:var(--raised);border-radius:6px;padding:.45rem .55rem}
.ov-k{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.15rem;font-family:'Space Grotesk',sans-serif}
.ov-v{font-size:11px;color:var(--text);font-weight:600;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="top">
  <div class="logo"><div class="logo-icon">🌐</div>Samsung Galaxy 전 라인업</div>
  <div class="top-right">
    <span class="chip chip-v3">v3.0</span>
    <span class="chip chip-ai">AI AGENT</span>
    <span class="mod-badge" id="modBadge">수정됨</span>
  </div>
</div>

<!-- SERIES TABS -->
<div class="series-bar" id="seriesBar"></div>

<!-- MODEL STRIP -->
<div class="model-strip"><div class="model-row" id="modelRow"></div></div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT -->
  <div class="left">
    <div class="left-scroll">

      <!-- Device visual -->
      <div class="device-visual">
        <div class="phone-wrap" id="phoneWrap"></div>
        <div class="device-name" id="devName">—</div>
        <div class="device-sub" id="devSub">—</div>
        <div class="device-status" id="devStatus">—</div>
      </div>

      <!-- Score -->
      <div class="score-row">
        <div class="sring">
          <svg width="52" height="52" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r="20" fill="none" stroke="var(--line)" stroke-width="4"/>
            <circle cx="26" cy="26" r="20" fill="none" stroke="url(#sg)" stroke-width="4"
              stroke-linecap="round" stroke-dasharray="125.6" id="sCircle" stroke-dashoffset="125.6"/>
            <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#38bdf8" id="sg1"/>
              <stop offset="100%" stop-color="#a78bfa" id="sg2"/>
            </linearGradient></defs>
          </svg>
          <div class="snum" id="sNum">—</div>
        </div>
        <div class="smeta">
          <div class="slbl">종합 점수</div>
          <div class="sgrade" id="sGrade">—</div>
          <div class="sdesc" id="sDesc">선택하세요</div>
        </div>
      </div>

      <!-- Perf bars -->
      <div class="perf-bars">
        <div class="pb-title">성능 지수</div>
        <div id="perfBars"></div>
      </div>

    </div>
  </div>

  <!-- CENTER -->
  <div class="center" id="centerPane">
    <div class="card"><div class="card-title">모델을 선택하세요</div><div style="color:var(--text2);font-size:11px">상단 탭에서 시리즈와 모델을 선택하면 상세 스펙과 파라미터 분석이 표시됩니다.</div></div>
  </div>

  <!-- RIGHT: PARAMS -->
  <div class="right">
    <div class="right-scroll">
      <div class="param-hdr">
        <span>파라미터</span>
        <div class="hdr-btns">
          <button class="mini-btn predict-btn" id="predictBtn" onclick="aiPredict()">🔮 AI 예측</button>
          <button class="mini-btn" onclick="resetParams()">초기화</button>
        </div>
      </div>
      <div id="paramCtrl"></div>
      <button class="sim-btn" onclick="runSim()">▶ 시뮬레이션</button>
    </div>

    <!-- Chat -->
    <div class="chat-wrap">
      <div class="chat-top">

let curS=0, curM=0, origP={}, workP={}, chatHist=[], simN=0;
const gS=()=>SERIES[curS];
const gM=()=>gS().models[curM];
const gPS=()=>PS[gS().pset];

/* ═══════════════════════════════════
  SCORE
═══════════════════════════════════ */
function normV(k,v){
  const p=gPS().find(d=>d.k===k);
  if(!p) return 50;
  // Thickness / ip: lower can be better or fixed range
  return Math.round((v-p.min)/(p.max-p.min)*100);
}
function calcScore(params){
  const ps=gPS();
  const wt={cpu:.2,gpu:.15,ai:.18,cam:.1,zoom:.04,bat:.08,chg:.05,ram:.07,disp:.05,price:.04,cover:.03,thick:.01,ip:.05,drop:.08};
  let s=0,tw=0;
  ps.forEach(p=>{
    const w=wt[p.k]||0;
    if(!w) return;
    let n=(p.k==='thick')?(p.max-params[p.k])/(p.max-p.min)*100 // lower=better
      :(params[p.k]-p.min)/(p.max-p.min)*100;
    s+=n*w; tw+=w;
  });
  return tw>0?Math.round(s/tw):0;
}
function grade(s){
  if(s>=90)return{g:'S+',d:'넥스트 레벨',c:'#38bdf8'};
  if(s>=78)return{g:'S',d:'최상급 플래그십',c:'#a78bfa'};
  if(s>=65)return{g:'A',d:'고성능',c:'#34d399'};
  if(s>=52)return{g:'B',d:'준수한 성능',c:'#fb923c'};
  if(s>=38)return{g:'C',d:'가성비 지향',c:'#facc15'};
  return{g:'D',d:'입문형',c:'#94a3b8'};
}
function updateScore(){
  const s=calcScore(workP),g=grade(s);
  document.getElementById('sNum').textContent=s;
  document.getElementById('sGrade').textContent=g.g;
  document.getElementById('sGrade').style.color=g.c;
  document.getElementById('sDesc').textContent=g.d;
  document.getElementById('sCircle').style.strokeDashoffset=125.6*(1-s/100);
  document.getElementById('sg1').setAttribute('stop-color',gS().col);
}

function buildModelStrip(){
  const s=gS();

    return `${i>0?'<div class="model-sep"></div>':''}

}

/* ═══════════════════════════════════

═══════════════════════════════════ */
const BKEYS=[{k:'cpu',l:'CPU'},{k:'gpu',l:'GPU'},{k:'ai',l:'AI'},{k:'cam',l:'카메라'},{k:'bat',l:'배터리'},{k:'disp',l:'화면'},{k:'ram',l:'RAM'}];
function buildBars(){
  const s=gS();
  const el=document.getElementById('perfBars');
  el.innerHTML='';
  BKEYS.forEach(b=>{
    if(!workP.hasOwnProperty(b.k)) return;
    const o=normV(b.k,origP[b.k]);
    const c=normV(b.k,workP[b.k]);
    const d=c-o;
    el.innerHTML+=`<div class="pbar">
      <div class="pbar-k">${b.l}</div>
      <div class="pbar-tr">
        <div class="pb-o" style="width:${o}%"></div>
        <div class="pb-f" id="pbf_${b.k}" style="width:0%;background:linear-gradient(90deg,${s.col},#a78bfa)"></div>
      </div>
      <div class="pbar-v mono">${workP[b.k]}</div>
      <div class="pbar-d ${d>0?'d+':d<0?'d-':'d0'}">${d>0?'+'+d:d===0?'':d}</div>
    </div>`;
  });
  setTimeout(()=>{BKEYS.forEach(b=>{const el=document.getElementById('pbf_'+b.k);if(el)el.style.width=normV(b.k,workP[b.k])+'%'});},40);
}

    <div style="font-size:10px;color:var(--text2);line-height:1.6;margin-bottom:.6rem">이 모델은 ${m.stl} 기반 예측입니다. AI 트렌드 분석 또는 파라미터를 직접 조정해 시뮬레이션하세요.</div>
    <div class="future-actions">
      <button class="fa-btn" id="trendBtn" onclick="aiTrend()">✦ AI 트렌드 예측</button>
      <button class="fa-btn" onclick="applyLinear()">📈 선형 트렌드 적용</button>
      <button class="fa-btn" onclick="savePred()">💾 예측 저장</button>
    </div>
    <div class="predict-out" id="predOut"></div>
  </div>`:'';

  // Sim result placeholder
  center.innerHTML=`
  <div class="card">
    <div class="card-title">핵심 스펙 요약</div>
    <div class="overview-grid">${ovHtml}</div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">상세 스펙</div>
      <div class="spec-g">${specHtml}</div>
    </div>
    <div class="card">
      <div class="card-title">진화 포인트</div>
      ${evoHtml}
    </div>
  </div>
  <div class="card">
    <div class="card-title">원본 vs 수정값 비교</div>
    <table class="dtbl"><thead><tr><th>항목</th><th>원본</th><th>현재</th><th>Δ</th></tr></thead>
    <tbody id="diffBody">${diffRows}</tbody></table>
  </div>
  ${futureHtml}
  <div class="card fi" id="simCard" style="display:none">
    <div class="card-title">▶ 시뮬레이션 분석 결과</div>
    <div class="sim-result" id="simBody"></div>
  </div>`;
}

function refreshDiff(){
  const ps=gPS();
  const diffBody=document.getElementById('diffBody');
  if(!diffBody) return;
  diffBody.innerHTML=ps.map(p=>{
    const d=workP[p.k]-origP[p.k];
    const dc=d>0?'td-u':d<0?'td-d':'td-e';
    return `<tr${d!==0?' class="chg"':''}>
      <td>${p.n}</td><td class="td-o">${origP[p.k]}</td>
      <td class="td-c">${workP[p.k]}</td>
      <td class="${dc}">${d>0?'+'+d:d===0?'—':d}</td></tr>`;
  }).join('');
  // refresh overview
  const ov=document.querySelector('.overview-grid');
  if(ov){
    const ps2=gPS();
    ov.innerHTML=ps2.slice(0,8).map(p=>`<div class="ov-item">
      <div class="ov-k">${p.n}</div>
      <div class="ov-v">${workP[p.k]||'—'}<span style="font-size:8px;opacity:.5;margin-left:2px">${p.u}</span></div>
    </div>`).join('');
  }
}

/* ═══════════════════════════════════
  PARAMS
═══════════════════════════════════ */
function buildParams(){
  const ps=gPS(), s=gS();
  const cats={};
  ps.forEach(p=>{ if(!cats[p.cat]) cats[p.cat]=[]; cats[p.cat].push(p); });
  let html='';
  Object.entries(cats).forEach(([cat,params])=>{
    html+=`<div class="cat-hdr">${cat}</div>`;
    params.forEach(p=>{
      html+=`<div class="pr" id="pr_${p.k}">
        <div class="pr-top">
          <span class="pr-name">${p.n} <span class="pr-tag" id="ptag_${p.k}">수정</span></span>
          <div class="pr-right">
            <input type="number" class="pr-in" id="pin_${p.k}" value="${workP[p.k]}"
              min="${p.min}" max="${p.max}" step="${p.s}"
              onchange="onNum('${p.k}',this.value)" oninput="onNum('${p.k}',this.value)"/>
            <span class="pr-unit">${p.u}</span>
          </div>
        </div>
        <input type="range" class="pr-slider" id="psl_${p.k}"
          min="${p.min}" max="${p.max}" step="${p.s}" value="${workP[p.k]}"
          oninput="onSlider('${p.k}',this.value)"/>
      </div>`;
    });
  });
  document.getElementById('paramCtrl').innerHTML=html;
}
function onSlider(k,v){ v=parseFloat(v); workP[k]=v; const n=document.getElementById('pin_'+k); if(n) n.value=v; markTag(k); refreshRight(true); }
function onNum(k,v){ const p=gPS().find(d=>d.k===k); if(!p) return; v=Math.min(p.max,Math.max(p.min,parseFloat(v)||p.min)); workP[k]=v; const sl=document.getElementById('psl_'+k); if(sl) sl.value=v; markTag(k); refreshRight(true); }
function markTag(k){ const tag=document.getElementById('ptag_'+k); if(!tag) return; const chg=workP[k]!==origP[k]; tag.className='pr-tag'+(chg?' on':''); const any=gPS().some(p=>workP[p.k]!==origP[p.k]); document.getElementById('modBadge').style.display=any?'inline-block':'none'; }
function resetParams(){ workP={...origP}; gPS().forEach(p=>{ const sl=document.getElementById('psl_'+p.k); const nm=document.getElementById('pin_'+p.k); if(sl) sl.value=origP[p.k]; if(nm) nm.value=origP[p.k]; markTag(p.k); }); refreshRight(false); document.getElementById('modBadge').style.display='none'; }
function refreshRight(fromSlider){ updateScore(); buildBars(); if(!fromSlider||fromSlider) refreshDiff(); }

/* ═══════════════════════════════════
  QUICK BTNS
═══════════════════════════════════ */
function buildQuicks(){
  document.getElementById('qrow').innerHTML=gS().quicks.map(q=>

}

/* ═══════════════════════════════════
  AI FUTURE FEATURES
═══════════════════════════════════ */
async function aiTrend(){
  const btn=document.getElementById('trendBtn');
  if(btn){ btn.disabled=true; btn.textContent='분석중...'; }
  const s=gS(), m=gM(), ps=gPS();
  const prev=s.models.filter(mm=>!mm.isFuture);
  const trend=prev.map(mm=>`${mm.id}(${mm.yr}): `+ps.map(p=>`${p.n}=${mm.p[p.k]||'?'}${p.u}`).join(',')).join('\n');
  const prompt=`Samsung ${s.name} 시리즈 애널리스트로서:

확인된 모델 트렌드:
${trend}

Galaxy ${m.id}(${m.yr}) — ${m.stl} 파라미터를 JSON으로 예측해주세요.
형식: {"params":{"cpu":숫자,...}, "analysis":"분석텍스트(100자)"} — 순수 JSON만.`;
  const out=document.getElementById('predOut');
  if(out){ out.style.display='block'; out.innerHTML='<div class="ld"><span>●</span><span>●</span><span>●</span></div>'; }
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    const txt=data.content.map(c=>c.text||'').join('');
    const jm=txt.match(/\{[\s\S]*\}/);
    if(jm){ const parsed=JSON.parse(jm[0]); if(parsed.params){ const ps2=gPS();
      Object.entries(parsed.params).forEach(([k,v])=>{ const pd=ps2.find(p=>p.k===k); if(!pd) return;
        const cl=Math.min(pd.max,Math.max(pd.min,Math.round(parseFloat(v)*10)/10));
        workP[k]=cl; const sl=document.getElementById('psl_'+k); const nm=document.getElementById('pin_'+k);
        if(sl) sl.value=cl; if(nm) nm.value=cl; markTag(k); });
      refreshRight(false); if(out) out.innerHTML=`<strong style="color:var(--a)">✦ AI 예측 적용</strong><br>${parsed.analysis||'완료'}`; }
    } else if(out) out.innerHTML=txt;
  }catch(e){ if(out) out.innerHTML='⚠️ 오류. 다시 시도해주세요.'; }
  if(btn){ btn.disabled=false; btn.textContent='✦ AI 트렌드 예측'; }
}
async function aiPredict(){ await aiTrend(); }
function applyLinear(){
  const s=gS(), m=gM(), ps=gPS();
  const conf=s.models.filter(mm=>!mm.isFuture);
  if(conf.length<2){ alert('최소 2개 확정 모델 필요'); return; }
  const last=conf[conf.length-1], prev2=conf[conf.length-2], gap=m.yr-last.yr;
  ps.forEach(p=>{ const d=(last.p[p.k]||0)-(prev2.p[p.k]||0); const proj=Math.round(((last.p[p.k]||0)+d*gap)*10)/10;
    const cl=Math.min(p.max,Math.max(p.min,proj)); workP[p.k]=cl;
    const sl=document.getElementById('psl_'+p.k); const nm=document.getElementById('pin_'+p.k);
    if(sl) sl.value=cl; if(nm) nm.value=cl; markTag(p.k); });
  refreshRight(false);
  const out=document.getElementById('predOut');
  if(out){ out.style.display='block'; out.innerHTML=`<strong style="color:var(--s)">📈 선형 트렌드 적용</strong><br>${conf[conf.length-2].id}→${last.id} 트렌드 ${gap}년 연장`; }
}
function savePred(){ const m=gM(); Object.assign(m.p,workP); Object.assign(origP,workP); gPS().forEach(p=>markTag(p.k)); document.getElementById('modBadge').style.display='none'; const out=document.getElementById('predOut'); if(out){ out.style.display='block'; out.innerHTML=`<strong style="color:var(--a)">💾 저장 완료</strong> — ${m.id} 기준값 갱신`; } }

/* ═══════════════════════════════════
  SIMULATE

async function runSim(){
  simN++;
  const card=document.getElementById('simCard');
  const body=document.getElementById('simBody');
  if(!card) return;
  card.style.display='block';
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
  body.innerHTML='<div class="ld"><span>●</span><span>●</span><span>●</span></div>';
  const s=gS(), m=gM(), ps=gPS();
  const chg=ps.filter(p=>workP[p.k]!==origP[p.k]);
  const score=calcScore(workP), g=grade(score);
  const prompt=`Samsung ${s.name}(${s.sub}) 파라미터 시뮬레이션:
모델: Galaxy ${m.id}(${m.yr}) — ${m.stl}

파라미터:
${ps.map(p=>`${p.n}: ${workP[p.k]}${p.u}${workP[p.k]!==origP[p.k]?` ← 변경(원본:${origP[p.k]})`:''}` ).join('\n')}

점수: ${score}/100 (${g.g}) | 변경 ${chg.length}개

분석 (200자 이내, 한국어):
1. 변경 파라미터 실사용 영향
2. ${s.name} 시리즈 내 포지션
3. 강점·개선점`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    const reply=data.content.map(c=>c.text||'').join('');
    body.innerHTML=reply.replace(/\n/g,'<br>');
    chatHist.push({role:'assistant',content:reply});
  }catch(e){ body.innerHTML='⚠️ 오류. 다시 시도해주세요.'; }
}

/* ═══════════════════════════════════

═══════════════════════════════════ */
function addMsg(txt,role){ const el=document.getElementById('chatMsgs'); const d=document.createElement('div'); d.className='msg msg-'+role; d.innerHTML=txt; el.appendChild(d); el.scrollTop=el.scrollHeight; return d; }
async function sendChat(){
  const inp=document.getElementById('cin'); const msg=inp.value.trim(); if(!msg) return;
  inp.value=''; addMsg(msg,'u'); chatHist.push({role:'user',content:msg});
  const btn=document.getElementById('sbtn'); btn.disabled=true;
  const ld=addMsg('<div class="ld"><span>●</span><span>●</span><span>●</span></div>','a');
  const s=gS(), m=gM(), ps=gPS();
  const chg=ps.filter(p=>workP[p.k]!==origP[p.k]);
  const score=calcScore(workP);
  const sys=`Samsung Galaxy 전 라인업 전문 AI 에이전트.
현재: ${s.name}(${s.sub}) > Galaxy ${m.id}(${m.yr}) — ${m.stl}
파라미터: ${ps.map(p=>`${p.n}=${workP[p.k]}${p.u}${workP[p.k]!==origP[p.k]?'*':''}`).join(', ')}
점수: ${score}/100 — ${grade(score).g} | 변경: ${chg.length}개
전 시리즈(S·ZFold·ZFlip·A·M·F·XCover·Tab) 맥락으로 답변. 한국어, 200자 이내.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:chatHist})});
    const data=await r.json();
    const reply=data.content.map(c=>c.text||'').join('');
    chatHist.push({role:'assistant',content:reply});
    ld.innerHTML=reply; document.getElementById('chatMsgs').scrollTop=9999;
  }catch(e){ ld.innerHTML='⚠️ 오류'; }
  btn.disabled=false;
}
function qa(q){ document.getElementById('cin').value=q; sendChat(); }
document.getElementById('cin').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });
